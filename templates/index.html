<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nicky AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #111215;
      border-bottom: 1px solid #2a2a35;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #7c6fff;
      letter-spacing: 1px;
    }

    header .tagline {
      font-size: 0.78rem;
      color: #666;
    }

    header .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #4caf50;
      margin-left: auto;
      box-shadow: 0 0 6px #4caf50;
    }

    #new-chat-btn {
      background: none;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      color: #888;
      font-size: 0.78rem;
      padding: 5px 12px;
      cursor: pointer;
      margin-left: 12px;
      transition: border-color 0.2s, color 0.2s;
    }
    #new-chat-btn:hover { border-color: #7c6fff; color: #7c6fff; }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: fadeIn 0.18s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.nicky { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 0.93rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #7c6fff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.nicky .bubble {
      background: #1a1a22;
      color: #e0e0e0;
      border: 1px solid #2a2a35;
      border-bottom-left-radius: 4px;
    }

    .sender {
      font-size: 0.72rem;
      color: #555;
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .typing-indicator span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #7c6fff;
      margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    #input-bar {
      background: #111215;
      border-top: 1px solid #2a2a35;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #user-input {
      flex: 1;
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 24px;
      padding: 10px 18px;
      color: #e0e0e0;
      font-size: 0.93rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: #7c6fff; }
    #user-input::placeholder { color: #444; }

    #send-btn {
      background: #7c6fff;
      border: none;
      border-radius: 50%;
      width: 42px; height: 42px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: #6655ee; }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { background: #333; cursor: default; }
    #send-btn svg { fill: #fff; width: 18px; height: 18px; }

    #chat-window::-webkit-scrollbar { width: 5px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">🤖 Nicky AI</div>
    <div class="tagline">Made by Moofun</div>
  </div>
  <div class="status-dot" title="Online"></div>
  <button id="new-chat-btn" title="Start a new conversation">+ New chat</button>
</header>

<div id="chat-window">
  <div class="message nicky">
    <div class="sender">Nicky</div>
    <div class="bubble">Hey! I'm Nicky 🤖 Type <strong>commands</strong> to see everything I can do, or just talk to me!</div>
  </div>
</div>

<div id="input-bar">
  <input id="user-input" type="text" placeholder="Talk to Nicky..." autocomplete="off" autofocus />
  <button id="send-btn" title="Send">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const chatWindow = document.getElementById('chat-window');
  const input      = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const newChatBtn = document.getElementById('new-chat-btn');

  function scrollBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }

  function addMessage(role, text) {
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;
    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = role === 'user' ? 'You' : 'Nicky';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text.replace(/^\[.*?\]\s*/, '');
    wrapper.appendChild(sender);
    wrapper.appendChild(bubble);
    chatWindow.appendChild(wrapper);
    scrollBottom();
    return bubble;  // return so streaming can append to it
  }

  function addTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'message nicky';
    wrapper.id = 'typing';
    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = 'Nicky';
    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-indicator';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    wrapper.appendChild(sender);
    wrapper.appendChild(bubble);
    chatWindow.appendChild(wrapper);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMessage('user', text);
    addTyping();
    sendBtn.disabled = true;
    input.disabled = true;

    try {
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let nickBubble = null;
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();  // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') break;
          try {
            const { token } = JSON.parse(payload);
            if (!token) continue;
            removeTyping();
            if (!nickBubble) {
              nickBubble = addMessage('nicky', '');
              nickBubble.textContent = '';  // start empty for streaming
            }
            nickBubble.textContent += token;
            scrollBottom();
          } catch {}
        }
      }
      // If nothing streamed (e.g. pure command response already added)
      removeTyping();

    } catch (e) {
      removeTyping();
      addMessage('nicky', '⚠️ Could not reach Nicky. Is the server running?');
    } finally {
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
    }
  }

  newChatBtn.addEventListener('click', async () => {
    await fetch('/api/session/clear', { method: 'POST' });
    chatWindow.innerHTML = '';
    addMessage('nicky', "Fresh start! I'm ready 🤖");
  });

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
